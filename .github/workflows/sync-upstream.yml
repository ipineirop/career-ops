name: Sync upstream

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/santifer/career-ops.git
          git fetch upstream main

      - name: Rebase fork commits onto upstream/main
        id: sync
        run: |
          set -e
          BEFORE=$(git rev-parse HEAD)
          if git rebase upstream/main; then
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" = "$AFTER" ]; then
              echo "result=noop" >> $GITHUB_OUTPUT
            else
              echo "result=ok" >> $GITHUB_OUTPUT
            fi
          else
            git rebase --abort || true
            echo "result=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Push to fork main
        if: steps.sync.outputs.result == 'ok'
        run: git push --force-with-lease origin main

      - name: Summarize result
        if: always()
        run: |
          RESULT="${{ steps.sync.outputs.result }}"
          case "$RESULT" in
            ok)      echo "### Sync upstream: OK" >> $GITHUB_STEP_SUMMARY ;;
            noop)    echo "### Sync upstream: already up to date" >> $GITHUB_STEP_SUMMARY ;;
            conflict)
              echo "### Sync upstream: CONFLICT — manual resolution needed" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Rebase against upstream/main hit conflicts. To resolve:" >> $GITHUB_STEP_SUMMARY
              echo "1. \`git fetch upstream && git rebase upstream/main\`" >> $GITHUB_STEP_SUMMARY
              echo "2. Resolve conflicts, then \`git rebase --continue\`" >> $GITHUB_STEP_SUMMARY
              echo "3. \`git push --force-with-lease origin main\`" >> $GITHUB_STEP_SUMMARY
              exit 1
              ;;
          esac
